<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>冰饮有约 开席一夏 | 泸州老窖冰饮城市地图</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="hero">
        <div class="hero-copy">
          <p class="eyebrow">泸州老窖 2026 冰饮门店地图</p>
          <h1>冰饮有约<br />开席一夏</h1>
          <p>定位你所在城市，查看附近参与门店、地址、电话、营业时间与高光28度低度冰饮示意。</p>
        </div>
        <div class="glass-visual" aria-label="冰饮白酒视觉">
          <div class="glass">
            <span class="ice ice-a"></span>
            <span class="ice ice-b"></span>
            <span class="ice ice-c"></span>
            <span class="liquid"></span>
          </div>
          <span>高光28度 · 低度尝鲜</span>
        </div>
      </header>

      <section class="locator-card" aria-label="城市定位">
        <div>
          <p class="eyebrow">当前城市</p>
          <h2 id="locationStatus">正在识别城市...</h2>
        </div>
        <div class="locator-controls">
          <label>
            手动定位城市
            <select id="citySelect"></select>
          </label>
          <label>
            活动门店分类
            <select id="categorySelect"></select>
          </label>
        </div>
      </section>

      <section class="map-card">
        <div class="section-head">
          <div>
            <p class="eyebrow">附近参与门店</p>
            <h2 id="cityHeadline">冰饮开席地图</h2>
          </div>
          <span class="pill" id="storeCount">0 家门店</span>
        </div>
        <div class="city-map" id="cityMap" aria-label="参与门店地图"></div>
        <div class="legend">
          <span><i class="dot dining"></i>餐饮门店</span>
          <span><i class="dot retail"></i>酒水门店</span>
        </div>
      </section>

      <section class="photo-section" aria-label="活动门店图片">
        <div class="section-head">
          <div>
            <p class="eyebrow">活动门店现场</p>
            <h2>看看身边可以去的冰饮品鉴门店</h2>
          </div>
        </div>
        <div class="photo-grid" id="storePhotos"></div>
      </section>

      <section class="store-section">
        <div class="section-head">
          <div>
            <p class="eyebrow">合作门店信息</p>
            <h2>点击门店查看基础信息</h2>
          </div>
        </div>
        <div class="store-list" id="storeList"></div>
      </section>
    </main>

    <dialog id="storeDialog">
      <form method="dialog" class="dialog-card">
        <button class="close-btn" value="cancel" aria-label="关闭">×</button>
        <p class="eyebrow" id="dialogType">门店详情</p>
        <h2 id="dialogTitle">合作门店信息</h2>
        <div class="detail-grid" id="dialogDetails"></div>
        <button class="member-btn full" id="dialogNavigateBtn" value="default">马上带我前往门店</button>
      </form>
    </dialog>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="./script.js"></script>
  </body>
</html>
